name: CI Ping

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
      - "fix/**"

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print context
        run: |
          echo "CI Ping started"
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          test -f .github/workflows/ci.yml
