global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: trend-scope-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:4443

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
